syntax = "proto3";

option java_multiple_files = true;

import "google/protobuf/empty.proto";
import "google/protobuf/wrappers.proto";

package company.vk.edu.distrib.compute.proto.shuuuurik;

service InternalKVService {
  rpc Get(KeyRequest) returns (GetResponse) {}
  rpc Upsert(UpsertRequest) returns (google.protobuf.Empty) {}
  rpc Delete(KeyRequest) returns (google.protobuf.Empty) {}
}

// Запрос по ключу (для Get и Delete)
message KeyRequest {
  string key = 1;
}

// Запрос на Upsert: ключ + тело
message UpsertRequest {
  string key = 1;
  bytes value = 2;
}

message GetResponse {
  google.protobuf.BytesValue value = 1;
}