syntax = "proto3";

option java_multiple_files = true;

package company.vk.edu.distrib.compute.proto.denchika;

service InternalKVService {
  rpc Get(GetRequest) returns (GetResponse) {}
  rpc Upsert(PutRequest) returns (PutResponse) {}
  rpc Delete(DeleteRequest) returns (DeleteResponse) {}
}

message GetRequest {
  string id = 1;
}

message GetResponse {
  bool found = 1;
  bytes value = 2;
}

message PutRequest {
  string key = 1;
  bytes value = 2;
}

message PutResponse {}

message DeleteRequest {
  string id = 1;
}

message DeleteResponse {}
