syntax = "proto3";

package company.vk.edu.distrib.compute.che1nov.grpc;

option java_multiple_files = true;
option java_package = "company.vk.edu.distrib.compute.che1nov.grpc";
option java_outer_classname = "Che1novInternalTransportProto";

service InternalTransportService {
  rpc Forward(ProxyRequest) returns (ProxyResponse);
}

message ProxyRequest {
  string method = 1;
  string key = 2;
  bytes body = 3;
}

message ProxyResponse {
  int32 status_code = 1;
  bytes body = 2;
}
