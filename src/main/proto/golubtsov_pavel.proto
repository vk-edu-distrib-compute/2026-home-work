syntax = "proto3";

option java_multiple_files = true;
option java_package = "company.vk.edu.distrib.compute.proto.golubtsov_pavel";

package golubtsov_pavel;

message KeyRequest {
    string key = 1;
}

message UpsertRequest {
    string key = 1;
    bytes value = 2;
}

message Response {
    uint32 status = 1;
    bytes value = 2;
}

service PGService {
    rpc get(KeyRequest) returns (Response) {}
    rpc upsert(UpsertRequest) returns (Response) {}
    rpc delete(KeyRequest) returns (Response) {}
}
