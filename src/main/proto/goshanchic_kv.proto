syntax = "proto3";

package goshanchic.kv;

option java_package = "company.vk.edu.distrib.compute.goshanchic.grpc";
option java_outer_classname = "KVInternal";

service KVInternalService {
  rpc Get (GetRequest) returns (GetResponse);
  rpc Put (PutRequest) returns (PutResponse);
  rpc Delete (DeleteRequest) returns (DeleteResponse);
}

message GetRequest {
  string id = 1;
}

message GetResponse {
  int32 status = 1;
  bytes value = 2;
}

message PutRequest {
  string id = 1;
  bytes value = 2;
}

message PutResponse {
  int32 status = 1;
}

message DeleteRequest {
  string id = 1;
}

message DeleteResponse {
  int32 status = 1;
}